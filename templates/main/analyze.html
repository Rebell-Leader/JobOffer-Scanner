{% extends "base.html" %}

{% block title %}Analyze Job - ApplyWise{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Analyze a Job Posting</h1>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="{{ url_for('main.analyze') }}">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="company_name" class="form-label">Company Name*</label>
                                <input type="text" class="form-control" id="company_name" name="company_name" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="job_title" class="form-label">Job Title*</label>
                                <input type="text" class="form-control" id="job_title" name="job_title" required>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="location" class="form-label">Location*</label>
                                <input type="text" class="form-control" id="location" name="location" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="compensation" class="form-label">Compensation</label>
                                <input type="text" class="form-control" id="compensation" name="compensation">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label d-block">Analysis Mode</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="model_choice" id="model_choice_fast" value="Fast (Qwen2.5-72B)" checked>
                            <label class="form-check-label" for="model_choice_fast">Fast Analysis</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="model_choice" id="model_choice_detailed" value="Detailed (DeepSeek-R1)">
                            <label class="form-check-label" for="model_choice_detailed">Detailed Analysis</label>
                        </div>
                        <small class="form-text text-muted">Fast mode gives quicker results, detailed mode provides more comprehensive analysis</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="job_description" class="form-label">Full Job Description*</label>
                        <textarea class="form-control" id="job_description" name="job_description" rows="10" required></textarea>
                        <div class="form-text">Paste the complete job posting text here</div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Analyze Job</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Auto-populate fields if the job posting contains specific sections
    document.getElementById('job_description').addEventListener('change', function() {
        const text = this.value;
        
        // Extract company name
        let companyField = document.getElementById('company_name');
        if (!companyField.value) {
            const companyMatch = text.match(/Company:\s*([^\n]+)/i);
            if (companyMatch) {
                companyField.value = companyMatch[1].trim();
            }
        }
        
        // Extract job title
        let titleField = document.getElementById('job_title');
        if (!titleField.value) {
            const titleMatch = text.match(/Title:\s*([^\n]+)/i) || 
                              text.match(/Position:\s*([^\n]+)/i) ||
                              text.match(/Job Title:\s*([^\n]+)/i);
            if (titleMatch) {
                titleField.value = titleMatch[1].trim();
            }
        }
        
        // Extract location
        let locationField = document.getElementById('location');
        if (!locationField.value) {
            const locationMatch = text.match(/Location:\s*([^\n]+)/i);
            if (locationMatch) {
                locationField.value = locationMatch[1].trim();
            }
        }
        
        // Extract compensation
        let compensationField = document.getElementById('compensation');
        if (!compensationField.value) {
            const compensationMatch = text.match(/Compensation:\s*([^\n]+)/i) ||
                                     text.match(/Salary:\s*([^\n]+)/i);
            if (compensationMatch) {
                compensationField.value = compensationMatch[1].trim();
            }
        }
    });
</script>
{% endblock %}
