# One-command local/prod-ish stack: web UI + Celery worker + Redis + Postgres.
#
#   cp .env.example .env   # fill in keys
#   docker compose up --build
#
# The Telegram bot is behind the "bot" profile: `docker compose --profile bot up`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: joboffer
      POSTGRES_PASSWORD: joboffer
      POSTGRES_DB: joboffer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joboffer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://joboffer:joboffer@postgres:5432/joboffer
      CELERY_BROKER_URL: redis://redis:6379/0
      USE_ALEMBIC: "1"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply migrations before serving (USE_ALEMBIC=1 means init_db won't create_all).
    command: >
      sh -c "alembic upgrade head &&
             streamlit run app.py --server.address=0.0.0.0 --server.port=5000 --server.headless=true"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://joboffer:joboffer@postgres:5432/joboffer
      CELERY_BROKER_URL: redis://redis:6379/0
      USE_ALEMBIC: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A worker.celery_app:get_celery_app worker --loglevel=info

  bot:
    build: .
    profiles: ["bot"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://joboffer:joboffer@postgres:5432/joboffer
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: python -m bot.main

volumes:
  pgdata:
