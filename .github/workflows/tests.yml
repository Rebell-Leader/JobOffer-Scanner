name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JS-based actions (checkout, setup-python) into the Node 24 runtime so the
# Node 20 deprecation warnings go away ahead of the forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff>=0.6
      - run: ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps + type stubs
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[telegram,worker,dev]"
      - run: mypy

  security:
    name: bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install "bandit>=1.7" "pip-audit>=2.7"
      # bandit is a hard gate (we keep it clean at medium+high severity).
      # Explicit -x (rather than pyproject config) avoids needing bandit[toml].
      - run: bandit -r . -ll -x ./tests,./migrations,./.venv
      # pip-audit is ADVISORY: transitive-dep CVEs are often outside our
      # control (base-image setuptools/wheel, etc.), so it informs without
      # blocking the build.
      - name: pip-audit (advisory)
        continue-on-error: true
        run: pip-audit --progress-spinner off || true

  js-tests:
    name: chrome-extension JS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node chrome-extension/extract.test.mjs

  test:
    name: unittest + coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Telegram extra so the bot-handler tests can run; dev extra for coverage.
          pip install -e ".[telegram,dev]"

      - name: Run unit tests under coverage
        # Strip any provider keys the CI environment may inject so the demo
        # smoke test exercises the no-key path deterministically.
        env:
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          FEATHERLESS_API_KEY: ""
          LLM_PROVIDER: ""
        run: coverage run -m unittest discover -s tests

      - name: Enforce coverage floor on the logic packages
        # app.py (the dense Streamlit UI) is only smoke-tested, so the gate is
        # on the service/logic packages where coverage is meaningful (~87%).
        run: |
          coverage report \
            --include="services/*,utils/*,db/*,tools/*,agents/*,api/*,bot/*,worker/*" \
            --fail-under=80

  migrations-postgres:
    name: alembic up/down/up on Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: joboffer
          POSTGRES_PASSWORD: joboffer
          POSTGRES_DB: joboffer_ci
        ports:
          - 5432:5432
        # Wait for the DB to be ready before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U joboffer -d joboffer_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "psycopg[binary]>=3.1"

      - name: Migrate up, down to base, and back up (Postgres)
        # SQLite's permissive DDL hides issues that Postgres enforces (real
        # ALTER semantics, FK ordering, type strictness). Running the full
        # up/down/up cycle here catches migrations that only work on SQLite.
        env:
          DATABASE_URL: postgresql+psycopg://joboffer:joboffer@localhost:5432/joboffer_ci
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Verify final schema has the latest tables
        env:
          DATABASE_URL: postgresql+psycopg://joboffer:joboffer@localhost:5432/joboffer_ci
        run: |
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, inspect
          eng = create_engine(os.environ["DATABASE_URL"])
          tables = set(inspect(eng).get_table_names())
          required = {
              "users", "applications", "application_stages",
              "master_cvs", "projects", "application_artifacts",
              "telegram_links", "audit_events", "background_analyses",
              "user_two_factor", "application_shares", "api_tokens",
              "webhooks", "webhook_deliveries", "oauth_identities",
              "email_verification_tokens", "llm_usage",
              "subscriptions", "usage_events",
          }
          missing = required - tables
          assert not missing, f"missing tables after migrate: {missing}"
          print(f"OK: {len(required)} expected tables present on Postgres")
          PY
