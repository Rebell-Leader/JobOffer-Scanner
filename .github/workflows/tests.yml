name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: unittest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the project + its optional Telegram extra so the bot
          # handler tests can run; --no-deps avoids pulling heavy LLM client
          # transitive deps we don't exercise in CI.
          pip install -e ".[telegram]"

      - name: Show installed package versions
        run: pip freeze | sort

      - name: Run unit tests
        # Strip any provider keys the CI environment may inject so the demo
        # smoke test exercises the no-key path deterministically.
        env:
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          FEATHERLESS_API_KEY: ""
          LLM_PROVIDER: ""
        run: python -m unittest discover -s tests -v
