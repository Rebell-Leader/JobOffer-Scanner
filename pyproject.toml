[project]
name = "joboffer-scanner"
version = "0.2.0"
description = "AI-assisted job-offer analysis platform (Phase 0: real LLM integration)"
requires-python = ">=3.11"
dependencies = [
    "alembic>=1.13.0",
    "anthropic>=0.40.0",
    "bcrypt>=4.1.0",
    "beautifulsoup4>=4.13.3",
    "langchain>=0.3.19",
    "langgraph>=0.3.1",
    "openai>=1.65.1",
    "pypdf>=4.0.0",
    "python-docx>=1.1.0",
    "requests>=2.32.3",
    "sqlalchemy>=2.0.30",
    "streamlit>=1.42.2",
]

[project.optional-dependencies]
telegram = ["python-telegram-bot>=21.0"]
worker = ["celery>=5.3.0", "redis>=5.0.0"]
browser = ["playwright>=1.44.0"]
